syntax = "proto3";

package pbuf;

message OntologyAttr {
  string type =1;
  string name =2;
  repeated string synonyms=3;
}

// HPOAttr provides rich attributes for Human Phenotype Ontology terms
// Extends OntologyAttr with queryable disease-phenotype annotations from phenotype.hpoa
// Enables queries like: [hpo.diseases.exists(d, d.evidence=="PCS" && d.frequency > 0.5)]
message HPOAttr {
  string name = 1;
  repeated string synonyms = 2;
  string definition = 3;

  // Disease associations from phenotype.hpoa (~280K annotations)
  repeated DiseaseAssoc diseases = 4;

  // Nested message for disease-phenotype associations
  message DiseaseAssoc {
    string id = 1;             // Disease identifier (e.g., "619340" for OMIM, "Orphanet:558")
    string dataset = 2;        // Target dataset name: "mim", "orphanet", "mondo"
    string name = 3;           // Disease name for display (e.g., "Marfan syndrome")
    string evidence = 4;       // Evidence code: "PCS", "TAS", "IEA"
    double frequency = 5;      // Frequency as decimal (0.375 for "3/8"), -1.0 if unavailable
    string frequency_raw = 6;  // Raw frequency string (e.g., "3/8", "HP:0040283")
    string onset = 7;          // Age of onset HP term (e.g., "HP:0003581")
    string sex = 8;            // Sex specificity: "MALE", "FEMALE", or empty
    string reference = 9;      // Citation (e.g., "PMID:31675180")
  }
}

message HgncAttr {
  repeated string names =1;
  repeated string symbols = 2;
  string locus_group = 3;
  string location = 4;
  
  repeated string aliases=5;
  string locus_type=6;
  repeated string prev_names=7;
  repeated string prev_symbols=8;
  string status=9;
  repeated string gene_groups=10;
}

message InterproAttr {
  repeated string names = 1;
  string short_name =2;
  string type = 3;
  int32 protein_count = 4;
}

message EnsemblAttr  {
  string name =1;
  string description =2;
  int32 start =3;
  int32 end =4;
  string biotype =5;
  string genome =6;
  string strand =7;
  string seq_region =8;
  ensemblbranch branch=9;
  int32 utr5Start =10;
  int32 utr5End =11;
  int32 utr3Start =12;
  int32 utr3End =13;
  int32 version =14;
  string source =15;
  int32 frame =16;

  // HGNC nomenclature data (populated for human genes only, when taxid=9606)
  HgncAttr hgnc = 17;
}

enum ensemblbranch {
  NONE=0;
  ENSEMBL=1;
  BACTERIA=2;
  FUNGI=3;
  METAZOA=4;
  PLANT=5;
  PROTIST=6;
}

message TaxoAttr {
  string name =1;
  string common_name =2;
  int32 rank =3;
  string taxonomic_division =4;
}

message  EnaAttr {
  string type =1;
}

message  PdbAttr {
  string method = 1;           // Experimental method (X-RAY DIFFRACTION, NMR, ELECTRON MICROSCOPY)
  string chains = 2;           // Comma-separated chain IDs
  string resolution = 3;       // Resolution in Angstroms
  string title = 4;            // Structure title/description
  string header = 5;           // Classification category (OXYGEN TRANSPORT, HYDROLASE, etc.)
  string release_date = 6;     // Deposition date (MM/DD/YY format)
  string source_organism = 7;  // Source organism name
  string molecule_type = 8;    // Molecule type: prot, nuc, prot-nuc, other
  repeated string authors = 9; // Author list
  int32 chain_count = 10;      // Number of polymer chains
}

message  DrugbankAttr {
  string name =1;
}

message OrphanetAttr {
  string name = 1;
  repeated string synonyms = 2;
  string definition = 3;
  string disorder_type = 4;
  repeated PhenotypeAssociation phenotypes = 5;
  int32 gene_count = 6;
  int32 phenotype_count = 7;

  message PhenotypeAssociation {
    string hpo_id = 1;
    string hpo_term = 2;
    string frequency = 3;
    double frequency_value = 4;
  }
}

message  ReactomePathwayAttr {
  string name =1;
  int32 tax_id =2;
  repeated string alt_names =3;  // Alternative/synonym names for pathway
                                  // TODO: Populate from pre-generated file (see analysis/reactome/REACTOME_ENHANCEMENTS.md)
                                  // Source: Reactome API 'name' field (array of alternative names)
                                  // Future: Generate ReactomeAltNames.txt via extract_reference_data.py for all pathways
  bool is_disease_pathway =4;    // True if pathway is disease-related (from HumanDiseasePathways.txt)
}

message UniprotAttr {
 repeated string accessions =1;
 repeated string genes =2;
